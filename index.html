<!DOCTYPE html>
<html>
<head>

<title>Mobile Login System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

<script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

<script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

<script src="script.js"></script>

</head>

<body>

<!-- PAGE 1 : LOGIN SCREEN -->
<div data-role="page" id="pageLogin">

    <div data-role="header" data-theme="b">
        <h1>User Login</h1>
    </div>

    <div role="main" class="ui-content">

        <form id="userLoginForm">

            <label for="user">Username :</label>
            <input type="text" id="user" name="user">

            <label for="pass">Password :</label>
            <input type="password" id="pass" name="pass">

            <button type="submit" data-theme="a">Login</button>

        </form>

        <!-- POPUP MESSAGE -->
        <div data-role="popup" id="errorPopup" data-theme="a">

            <div data-role="header">
                <h1>Error</h1>
            </div>

            <div role="main" class="ui-content">
                <p>Please enter both username and password.</p>
            </div>

        </div>

    </div>

    <div data-role="footer" data-theme="b">
        <h4>Mobile Application Lab</h4>
    </div>

</div>


<!-- PAGE 2 : LOGIN SUCCESS -->
<div data-role="page" id="pageSuccess">

    <div data-role="header" data-theme="b">
        <h1>Login Successful</h1>
    </div>

    <div role="main" class="ui-content">
        <h2>Welcome!</h2>
        <p>You have successfully logged into the system.</p>

        <a href="#pageLogin" data-role="button" data-theme="a">
            Sign Out
        </a>
    </div>

    <div data-role="footer" data-theme="b">
        <h4>Mobile Application Lab</h4>
    </div>

</div>

</body>
</html>
